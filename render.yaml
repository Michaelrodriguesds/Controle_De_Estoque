services:
  - type: web
    name: estoque-api
    env: docker
    image: myshelrodrigues189/estoque-api:prod
    plan: free
    region: oregon
    healthCheckPath: /api/produtos
    autoDeploy: false

  - type: web
    name: estoque-frontend
    env: docker
    image: myshelrodrigues189/estoque-frontend:prod
    plan: free
    region: oregon
    healthCheckPath: /
    autoDeploy: false
