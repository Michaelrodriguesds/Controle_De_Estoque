services:
  - type: web
    name: estoque-api
    env: docker
    repo: https://github.com/Michaelrodriguesds/Controle_De_Estoque
    branch: main
    dockerfilePath: ./api/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /api/produtos
    autoDeploy: false

  - type: web
    name: estoque-frontend
    env: docker
    repo: https://github.com/Michaelrodriguesds/Controle_De_Estoque
    branch: main
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /
    autoDeploy: false
